name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Run shellcheck
        run: |
          shellcheck -S warning -x \
            install/install.sh \
            install/uninstall.sh \
            install/lib/*.sh \
            scripts/*.sh

  shfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@latest
      - name: Run shfmt diff
        run: |
          shfmt -d -i 2 -ci \
            install/install.sh \
            install/uninstall.sh \
            install/lib/*.sh \
            scripts/*.sh

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff
      - name: Run ruff
        run: ruff check subscription/ tests/

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yamllint
      - name: Run yamllint
        run: |
          yamllint -s \
            $(find templates examples .github -type f \
              \( -name '*.yml' -o -name '*.yaml' \))

  jsonlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate JSON
        run: |
          status=0
          while IFS= read -r f; do
            if ! python3 -m json.tool < "$f" >/dev/null; then
              echo "Invalid JSON: $f"
              status=1
            fi
          done < <(find templates examples -type f -name '*.json')
          exit "$status"

  mdcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run markdown link check
        run: make mdcheck

  examples-up-to-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Re-generate examples and diff
        run: |
          scripts/make-example.sh
          if ! git diff --exit-code examples/; then
            echo "::error::examples/ is out of date. Run 'make examples' and commit."
            exit 1
          fi
