name: Feature request
description: Propose an enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: A scenario that is currently painful or impossible.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: markdown
    attributes:
      value: |
        Please check `CONTRIBUTING.md` "Out of scope" first — some classes of feature (web admin panel, Docker, multi-user billing) are intentionally not in scope for v1.
